<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { ListeFilms } from "./component/ListeFilms/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { SelecProfils } from "./component/SelecProfils/script.js";

      import { DataMovie } from "./data/dataMovie.js";
      import { DataNav } from "./data/dataNav.js";
      import { DataCategory } from "./data/dataCategory.js";
      import { DataProfils } from "./data/dataProfils.js";
      

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.loadHome = async function(id){
        let content = document.querySelector("#content");
        content.innerHTML = "";
        let dataP = await DataProfils.requestProfilID(id);
        V.renderNavBar(DataNav,dataP[0])
        V.renderMovieCategory();
      }

      C.loadProfils = async function(){
        let content = document.querySelector("#content");
        content.innerHTML = "";
        V.renderSelecProfils();
      }

      C.loadDetail = async function(id){
        let content = document.querySelector("#content");
        content.innerHTML = "";
        V.renderMovieDetail(id);
      }

      C.start = async function () {
        V.renderSelecProfils();
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (data,dataP) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.formatMany(data,dataP);
      };

      V.renderListeFilms = function (data) {
        let content = document.querySelector("#content");
        content.innerHTML += ListeFilms.formatMany(data);
      }

      V.renderMovieDetail = async function (id) {
        let data = await DataMovie.requestFullMovie(id);
        let content = document.querySelector("#content");
        content.innerHTML += MovieDetail.format(data);
      }

      V.renderMovieCategory = async function () {
        let data = await DataCategory.requestCategoryExist();
        let content = document.querySelector("#content");
        content.innerHTML += MovieCategory.formatMany(data);
        for (let c of data){
          let datafilm = await DataMovie.requestMoviesCategory(c.id)
          let position = document.querySelector(".listeCateg"+c.id);
          position.innerHTML = ListeFilms.formatMany(datafilm);
        }
      }

      V.renderSelecProfils = async function () {
        let content = document.querySelector("#content");
        let data = await DataProfils.requestProfils();
        content.innerHTML += SelecProfils.formatMany(data);
      }

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
